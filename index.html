<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Müller-Lyer Illusion Experiment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; }
    button { font-family: sans-serif; cursor: pointer; }
    input[type="range"] { accent-color: #38bdf8; width: 100%; cursor: pointer; display: block; }
    canvas { display: block; width: 100%; height: auto; }
    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const GROUPS = [
  {
    name: "Group 1",
    members: ["Samson, Kency Juan Kynn", "Octa, Aubrey Claire", "Sunga, Charice"],
    rounds: [
      { a: 0, b: 1, c: 2 },
      { a: 2, b: 0, c: 1 },
      { a: 1, b: 2, c: 0 },
    ],
  },
  {
    name: "Group 2",
    members: ["Albo, Raine Jariah", "Garafil, Marq Rosswell", "Salvador, Lian", "Vistar, Guenevere"],
    rounds: [
      { a: 0, b: 1, c: 2, co: 3 },
      { a: 2, b: 3, c: 0, co: 1 },
      { a: 3, b: 0, c: 1, co: 2 },
      { a: 1, b: 2, c: 3, co: 0 },
    ],
  },
];

const ORDERS = [
  [0, 1, 2, 3, 4],
  [4, 2, 0, 3, 1],
  [1, 3, 0, 2, 4],
  [3, 0, 4, 1, 2],
];

const buildTrials = (sp) =>
  ORDERS.flatMap((order, oi) =>
    order.map((si) => ({ orderBlock: oi + 1, startingLength: sp[si] }))
  );

const REFERENCE_LENGTH = 180;
const CANVAS_W = 700;
const CANVAS_H = 160;
const ARROW_SIZE = 22;
const PX_TO_CM = 0.026458;

// ── STATE ─────────────────────────────────────────────────────────────────────
const DEFAULT_POINTS = [-60, -30, 0, 30, 60].map((o) => REFERENCE_LENGTH + o);

let S = {
  screen: "setup",
  groupIdx: 0,
  roundIdx: 0,
  trialIdx: 0,
  adjustableLength: REFERENCE_LENGTH,
  results: [],
  trials: [],
  preSetupPoints: [...DEFAULT_POINTS],
  preSetupActiveIdx: 0,
};

let _cleanupFns = [];

// ── DRAWING ───────────────────────────────────────────────────────────────────
function drawLine(ctx, cx, y, len, as, wingDir, color) {
  const x1 = cx - len / 2, x2 = cx + len / 2;
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
  [[x1, -1], [x2, 1]].forEach(([x, dir]) => {
    const s = wingDir === "out" ? 1 : -1;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + dir * s * as, y - as * 0.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + dir * s * as, y + as * 0.6); ctx.stroke();
  });
}

function drawMullerLyer(canvas, adjLen) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  const cx = CANVAS_W / 2, refY = CANVAS_H * 0.28, adjY = CANVAS_H * 0.72;
  ctx.fillStyle = "#94a3b8"; ctx.font = "11px sans-serif"; ctx.textAlign = "right";
  ctx.fillText("Reference", cx - REFERENCE_LENGTH / 2 - ARROW_SIZE - 10, refY + 4);
  drawLine(ctx, cx, refY, REFERENCE_LENGTH, ARROW_SIZE, "out", "#e2e8f0");
  ctx.fillStyle = "#94a3b8"; ctx.textAlign = "right";
  ctx.fillText("Adjust \u2192", cx - adjLen / 2 - ARROW_SIZE - 10, adjY + 4);
  drawLine(ctx, cx, adjY, adjLen, ARROW_SIZE, "in", "#38bdf8");
  ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 1; ctx.setLineDash([4, 6]);
  ctx.beginPath(); ctx.moveTo(0, CANVAS_H / 2); ctx.lineTo(CANVAS_W, CANVAS_H / 2); ctx.stroke();
  ctx.setLineDash([]);
}

function drawPreview(canvas, len) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = "#334155"; ctx.font = "11px sans-serif"; ctx.textAlign = "center";
  ctx.fillText("Starting position preview \u2014 only Researcher A can see this", CANVAS_W / 2, 16);
  drawLine(ctx, CANVAS_W / 2, CANVAS_H / 2 + 8, len, ARROW_SIZE, "in", "#38bdf8");
}

function drawComparison(canvas, adjLen) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  const cx = CANVAS_W / 2, y = CANVAS_H / 2, diff = adjLen - REFERENCE_LENGTH;
  drawLine(ctx, cx, y - 28, REFERENCE_LENGTH, ARROW_SIZE, "out", "#e2e8f0");
  ctx.fillStyle = "#94a3b8"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "left";
  ctx.fillText("Reference (correct)", cx - REFERENCE_LENGTH / 2, y - 38);
  drawLine(ctx, cx, y + 28, adjLen, ARROW_SIZE, "in", "#38bdf8");
  ctx.fillStyle = "#94a3b8"; ctx.textAlign = "left";
  ctx.fillText("Researcher B's line", cx - adjLen / 2, y + 48);
  if (Math.abs(diff) > 2) {
    const refR = cx + REFERENCE_LENGTH / 2, adjR = cx + adjLen / 2;
    ctx.strokeStyle = diff > 0 ? "#4ade80" : "#fb923c";
    ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(refR, y - 22); ctx.lineTo(refR, y + 22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(adjR, y - 22); ctx.lineTo(adjR, y + 22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(refR, y); ctx.lineTo(adjR, y); ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const roleColor = { A: "#38bdf8", B: "#4ade80", C: "#fb923c", Co: "#c084fc" };
const roleLabel = { a: "Researcher A", b: "Researcher B", c: "Researcher C", co: "Co-Recorder" };

function badge(color, text) {
  return `<span style="display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:0.06em;background:${color}22;color:${color};border:1px solid ${color}44;text-transform:uppercase;">${text}</span>`;
}

function fmtCm(val) {
  return (val >= 0 ? "+" : "") + val.toFixed(1);
}

// ── CLEANUP ───────────────────────────────────────────────────────────────────
function cleanup() {
  _cleanupFns.forEach((fn) => fn());
  _cleanupFns = [];
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  cleanup();
  const app = document.getElementById("app");
  const { screen } = S;

  if (screen === "setup")       { app.innerHTML = renderSetup(); return; }
  if (screen === "preSetup")    { app.innerHTML = renderPreSetup(); initPreSetup(); return; }
  if (screen === "trialReady")  { app.innerHTML = renderTrialReady(); initTrialReady(); return; }
  if (screen === "handoff")     { app.innerHTML = renderHandoff(); return; }
  if (screen === "trial")       { app.innerHTML = renderTrial(); initTrial(); return; }
  if (screen === "submitBuffer"){ app.innerHTML = renderSubmitBuffer(); return; }
  if (screen === "record")      { app.innerHTML = renderRecord(); initRecord(); return; }
  if (screen === "buffer")      { app.innerHTML = renderBuffer(); return; }
  if (screen === "results")     { app.innerHTML = renderResults(); return; }
}

// ── SETUP SCREEN ──────────────────────────────────────────────────────────────
function renderSetup() {
  const group = GROUPS[S.groupIdx];
  const round = group.rounds[S.roundIdx];

  const groupBtns = GROUPS.map((g, i) => `
    <button onclick="selectGroup(${i})"
      style="flex:1;padding:10px 0;border-radius:10px;
             border:2px solid ${S.groupIdx === i ? "#38bdf8" : "#1e293b"};
             background:${S.groupIdx === i ? "#0f2942" : "#1e293b"};
             color:${S.groupIdx === i ? "#38bdf8" : "#94a3b8"};
             font-weight:700;font-size:14px;">${g.name}</button>
  `).join("");

  const roundBtns = group.rounds.map((_, i) => `
    <button onclick="selectRound(${i})"
      style="flex:1;padding:10px 0;border-radius:10px;
             border:2px solid ${S.roundIdx === i ? "#38bdf8" : "#1e293b"};
             background:${S.roundIdx === i ? "#0f2942" : "#1e293b"};
             color:${S.roundIdx === i ? "#38bdf8" : "#94a3b8"};
             font-weight:700;font-size:14px;">Round ${i + 1}</button>
  `).join("");

  const roleEntries = Object.entries(round).map(([role, memberIdx]) => {
    const color = roleColor[role.charAt(0).toUpperCase()];
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      ${badge(color, roleLabel[role])}
      <span style="font-size:14px;color:#cbd5e1;">${group.members[memberIdx]}</span>
    </div>`;
  }).join("");

  return `
    <div class="wrap">
      <div style="max-width:560px;width:100%;">
        <div style="text-align:center;margin-bottom:32px;">
          <div style="font-size:11px;letter-spacing:0.15em;color:#38bdf8;font-weight:700;text-transform:uppercase;margin-bottom:8px;">Experimental Psychology</div>
          <h1 style="font-size:28px;font-weight:800;margin:0;color:#f8fafc;">M\u00fcller-Lyer Illusion</h1>
          <p style="color:#64748b;margin:8px 0 0;font-size:14px;">Select your group and round to begin</p>
        </div>
        <div style="margin-bottom:20px;">
          <label style="font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;">Group</label>
          <div style="display:flex;gap:10px;margin-top:8px;">${groupBtns}</div>
        </div>
        <div style="margin-bottom:24px;">
          <label style="font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;">Round</label>
          <div style="display:flex;gap:10px;margin-top:8px;">${roundBtns}</div>
        </div>
        <div style="background:#1e293b;border-radius:14px;padding:20px;margin-bottom:28px;border:1px solid #334155;">
          <div style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;">Role Assignments</div>
          ${roleEntries}
        </div>
        <button onclick="handleStart(${S.groupIdx},${S.roundIdx})"
          style="width:100%;padding:14px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#0284c7,#0ea5e9);color:#fff;font-size:16px;font-weight:800;">
          Start Round ${S.roundIdx + 1} \u2192
        </button>
      </div>
    </div>`;
}

// ── RESEARCHER A: PRE-SETUP ────────────────────────────────────────────────────
function renderPreSetup() {
  const points = S.preSetupPoints;
  const ai = S.preSetupActiveIdx;
  const offsetCm = ((points[ai] - REFERENCE_LENGTH) * PX_TO_CM).toFixed(1);

  const spTabs = points.map((p, i) => {
    const cm = ((p - REFERENCE_LENGTH) * PX_TO_CM).toFixed(1);
    return `<button onclick="setPreSetupActiveIdx(${i})"
      style="flex:1;padding:10px 0;border-radius:10px;
             border:2px solid ${ai === i ? "#38bdf8" : "#1e293b"};
             background:${ai === i ? "#0f2942" : "#1e293b"};
             color:${ai === i ? "#38bdf8" : "#94a3b8"};
             font-weight:700;font-size:13px;">SP ${i + 1}<br>
      <span style="font-size:11px;font-weight:400;color:${ai === i ? "#7dd3fc" : "#475569"};">${fmtCm(parseFloat(cm))} cm</span>
    </button>`;
  }).join("");

  const summary = points.map((p, i) => {
    const cm = ((p - REFERENCE_LENGTH) * PX_TO_CM).toFixed(1);
    return `<div onclick="setPreSetupActiveIdx(${i})"
      style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;cursor:pointer;
             background:${ai === i ? "#0f2942" : "#0f172a"};
             border:1px solid ${ai === i ? "#38bdf8" : "#334155"};">
      <div style="font-size:11px;color:#64748b;margin-bottom:2px;">SP ${i + 1}</div>
      <div style="font-size:13px;font-weight:700;color:${parseFloat(cm) >= 0 ? "#38bdf8" : "#fb923c"};">${fmtCm(parseFloat(cm))}</div>
      <div style="font-size:10px;color:#475569;">cm</div>
    </div>`;
  }).join("");

  return `
    <div class="wrap">
      <div style="max-width:740px;width:100%;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          ${badge(roleColor.A, "Researcher A \u2014 Pre-Setup (Private)")}
          <span style="font-size:12px;color:#64748b;">Step 1 of 2</span>
        </div>
        <div style="background:#0c1a2e;border:1px solid #1e3a5f;border-radius:12px;padding:12px 16px;margin-bottom:18px;">
          <p style="margin:0;font-size:13px;color:#7dd3fc;line-height:1.7;">
            \uD83D\uDD12 <strong>Only Researcher A sees this.</strong> Set your 5 starting positions before trials begin.
            These will be used across all 4 order blocks (20 trials total). Researcher B must not see this screen.
          </p>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px;">${spTabs}</div>
        <div style="border-radius:14px;overflow:hidden;border:1px solid #1e293b;margin-bottom:14px;">
          <canvas id="preview-canvas" width="${CANVAS_W}" height="${CANVAS_H}"></canvas>
        </div>
        <div style="margin-bottom:24px;padding:0 4px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:12px;color:#64748b;">Starting Point ${ai + 1}</span>
            <span id="offset-display" style="font-size:13px;color:#38bdf8;font-weight:700;">${fmtCm(parseFloat(offsetCm))} cm from center</span>
          </div>
          <input type="range" id="sp-slider" min="80" max="320" value="${points[ai]}" oninput="updatePreSetupPoint(this.value)">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#334155;margin-top:4px;">
            <span>\u2190 Far left (short)</span><span>Center</span><span>Far right (long) \u2192</span>
          </div>
        </div>
        <div style="background:#1e293b;border-radius:12px;padding:14px 16px;margin-bottom:20px;border:1px solid #334155;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">All 5 Starting Points</div>
          <div style="display:flex;gap:8px;">${summary}</div>
        </div>
        <button onclick="handlePreSetupDone()"
          style="width:100%;padding:14px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;font-size:15px;font-weight:800;">
          \u2713 All 5 positions set \u2014 Proceed to trials \u2192
        </button>
      </div>
    </div>`;
}

function initPreSetup() {
  drawPreview(document.getElementById("preview-canvas"), S.preSetupPoints[S.preSetupActiveIdx]);
}

// ── RESEARCHER A: PER-TRIAL READY ─────────────────────────────────────────────
function renderTrialReady() {
  const trial = S.trials[S.trialIdx];
  const cm = ((trial.startingLength - REFERENCE_LENGTH) * PX_TO_CM).toFixed(1);
  return `
    <div class="wrap">
      <div style="max-width:740px;width:100%;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          ${badge(roleColor.A, "Researcher A \u2014 Set Starting Position")}
          <span style="font-size:13px;color:#64748b;">Trial <strong style="color:#f8fafc;">${S.trialIdx + 1}</strong> / 20 &middot; Block ${trial.orderBlock}</span>
        </div>
        <div style="background:#0c1a2e;border:1px solid #1e3a5f;border-radius:12px;padding:12px 16px;margin-bottom:16px;">
          <p style="margin:0;font-size:13px;color:#7dd3fc;line-height:1.7;">
            \uD83D\uDD12 The app has loaded the correct starting position for this trial based on your pre-set values.
            Confirm it looks right, then hand the device to <strong>Researcher B</strong> face-down.
          </p>
        </div>
        <div style="border-radius:14px;overflow:hidden;border:1px solid #1e293b;margin-bottom:14px;">
          <canvas id="trial-ready-canvas" width="${CANVAS_W}" height="${CANVAS_H}"></canvas>
        </div>
        <div style="background:#1e293b;border-radius:10px;padding:10px 16px;margin-bottom:20px;border:1px solid #334155;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:13px;color:#94a3b8;">Starting offset</span>
          <span style="font-size:16px;font-weight:700;color:${parseFloat(cm) >= 0 ? "#38bdf8" : "#fb923c"};">${fmtCm(parseFloat(cm))} cm</span>
        </div>
        <button onclick="handleTrialReadyDone()"
          style="width:100%;padding:14px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;font-size:15px;font-weight:800;">
          \u2713 Position set \u2014 Hand device to Researcher B
        </button>
      </div>
    </div>`;
}

function initTrialReady() {
  drawPreview(document.getElementById("trial-ready-canvas"), S.trials[S.trialIdx].startingLength);
}

// ── RESEARCHER B HANDOFF ──────────────────────────────────────────────────────
function renderHandoff() {
  return `
    <div class="wrap">
      <div style="max-width:440px;width:100%;text-align:center;">
        ${badge(roleColor.B, "Researcher B")}
        <h2 style="font-size:24px;font-weight:800;margin:16px 0 8px;color:#f8fafc;">Trial ${S.trialIdx + 1} of 20</h2>
        <p style="color:#64748b;font-size:14px;margin-bottom:32px;">Researcher A has set the starting position. Do not look at how it was set.</p>
        <div style="background:#1e293b;border-radius:14px;padding:20px;margin-bottom:32px;border:1px solid #334155;text-align:left;">
          <p style="margin:0;font-size:14px;color:#94a3b8;line-height:1.8;">
            \u2713 Adjust the blue line until it looks equal to the white line<br>
            \u2713 Use your own judgment \u2014 don't try to correct for the illusion<br>
            \u2713 Keep the same mental standard for all 20 trials
          </p>
        </div>
        <button onclick="handleBReady()"
          style="width:100%;padding:14px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-size:15px;font-weight:800;">
          I'm ready \u2014 Show me the lines
        </button>
      </div>
    </div>`;
}

// ── TRIAL SCREEN ──────────────────────────────────────────────────────────────
function renderTrial() {
  const trial = S.trials[S.trialIdx];
  return `
    <div style="min-height:100vh;background:#0f172a;color:#e2e8f0;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">
      <div style="max-width:740px;width:100%;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          ${badge(roleColor.B, "Researcher B")}
          <span style="font-size:13px;color:#64748b;">Trial <strong style="color:#f8fafc;">${S.trialIdx + 1}</strong> / 20 &middot; Block ${trial.orderBlock}</span>
        </div>
        <p style="text-align:center;font-size:14px;color:#64748b;margin:0 0 14px;">
          Drag the canvas or slider until both lines look <strong style="color:#e2e8f0;">equal in length</strong>
        </p>
        <div id="trial-canvas-wrap" style="border-radius:16px;overflow:hidden;border:1px solid #1e293b;cursor:ew-resize;user-select:none;-webkit-user-select:none;margin-bottom:16px;">
          <canvas id="trial-canvas" width="${CANVAS_W}" height="${CANVAS_H}"></canvas>
        </div>
        <div style="margin-bottom:24px;padding:0 8px;">
          <input type="range" id="trial-slider" min="60" max="340" value="${S.adjustableLength}" oninput="updateTrialLength(this.value)">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#334155;margin-top:4px;">
            <span>Shorter</span><span>Longer</span>
          </div>
        </div>
        <button onclick="handleSubmitTrial()"
          style="width:100%;padding:14px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#0284c7,#0ea5e9);color:#fff;font-size:15px;font-weight:800;">
          These look equal \u2014 Submit
        </button>
      </div>
    </div>`;
}

function initTrial() {
  const canvas = document.getElementById("trial-canvas");
  drawMullerLyer(canvas, S.adjustableLength);

  const wrap = document.getElementById("trial-canvas-wrap");
  let isDragging = false, startX = 0, startLen = S.adjustableLength;

  const onMouseDown = (e) => {
    isDragging = true;
    startX = e.clientX;
    startLen = S.adjustableLength;
  };
  const onMouseMove = (e) => {
    if (!isDragging) return;
    const newLen = Math.max(60, Math.min(340, startLen + (e.clientX - startX) * 2));
    S.adjustableLength = newLen;
    drawMullerLyer(canvas, newLen);
    const slider = document.getElementById("trial-slider");
    if (slider) slider.value = newLen;
  };
  const onMouseUp = () => { isDragging = false; };

  const onTouchStart = (e) => {
    isDragging = true;
    startX = e.touches[0].clientX;
    startLen = S.adjustableLength;
  };
  const onTouchMove = (e) => {
    if (!isDragging) return;
    const newLen = Math.max(60, Math.min(340, startLen + (e.touches[0].clientX - startX) * 2));
    S.adjustableLength = newLen;
    drawMullerLyer(canvas, newLen);
    const slider = document.getElementById("trial-slider");
    if (slider) slider.value = newLen;
  };
  const onTouchEnd = () => { isDragging = false; };

  wrap.addEventListener("mousedown", onMouseDown);
  document.addEventListener("mousemove", onMouseMove);
  document.addEventListener("mouseup", onMouseUp);
  wrap.addEventListener("touchstart", onTouchStart, { passive: true });
  wrap.addEventListener("touchmove", onTouchMove, { passive: true });
  wrap.addEventListener("touchend", onTouchEnd);

  _cleanupFns.push(() => {
    try {
      wrap.removeEventListener("mousedown", onMouseDown);
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
      wrap.removeEventListener("touchstart", onTouchStart);
      wrap.removeEventListener("touchmove", onTouchMove);
      wrap.removeEventListener("touchend", onTouchEnd);
    } catch (_) {}
  });
}

// ── SUBMIT BUFFER ─────────────────────────────────────────────────────────────
function renderSubmitBuffer() {
  return `
    <div class="wrap">
      <div style="max-width:440px;width:100%;text-align:center;">
        ${badge(roleColor.B, "Researcher B \u2014 Done")}
        <h2 style="font-size:24px;font-weight:800;margin:16px 0 8px;color:#f8fafc;">Trial ${S.trialIdx + 1} submitted</h2>
        <p style="color:#64748b;font-size:14px;margin-bottom:32px;">Please hand the device to <strong style="color:#fb923c;">Researcher C</strong> before continuing.</p>
        <div style="background:#1e293b;border-radius:14px;padding:20px;margin-bottom:32px;border:1px solid #334155;text-align:left;">
          <p style="margin:0;font-size:14px;color:#94a3b8;line-height:1.8;">
            \u2713 Do not look at the next screen<br>
            \u2713 Hand the device face-down to Researcher C<br>
            \u2713 Researcher C will tap the button when ready
          </p>
        </div>
        <button onclick="goToRecord()"
          style="width:100%;padding:14px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#c2410c,#fb923c);color:#fff;font-size:15px;font-weight:800;">
          Researcher C has the device \u2192
        </button>
      </div>
    </div>`;
}

// ── RECORD SCREEN ─────────────────────────────────────────────────────────────
function renderRecord() {
  const adjLen = S.adjustableLength;
  const rawError = (adjLen - REFERENCE_LENGTH) * PX_TO_CM;
  const absError = Math.abs(rawError);
  const isPerfect = absError < 0.05;
  const isOver = rawError > 0 && !isPerfect;
  const isUnder = rawError < 0 && !isPerfect;

  const cardColor = isPerfect ? "#4ade80" : isOver ? "#38bdf8" : "#fb923c";
  const cardBg = isPerfect ? "#052e16" : isOver ? "#0c1a3a" : "#1c0a00";
  const emoji = isPerfect ? "\uD83C\uDFAF" : isOver ? "\u2192" : "\u2190";
  const statusLabel = isPerfect ? "Perfect!" : isOver ? "Overshot (+)" : "Undershot (\u2212)";
  const statusDesc = isPerfect
    ? "Researcher B placed the line exactly at the reference length."
    : isOver
    ? "Researcher B made the line too long \u2014 went past the reference."
    : "Researcher B made the line too short \u2014 didn't reach the reference.";

  const autoDir = rawError > 0 ? "+" : "\u2212";

  return `
    <div class="wrap">
      <div style="max-width:740px;width:100%;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          ${badge(roleColor.C, "Researcher C \u2014 Record Result")}
          <span style="font-size:13px;color:#64748b;">Trial <strong style="color:#f8fafc;">${S.trialIdx + 1}</strong> / 20</span>
        </div>
        <div style="border-radius:14px;overflow:hidden;border:1px solid #1e293b;margin-bottom:20px;">
          <canvas id="comparison-canvas" width="${CANVAS_W}" height="${CANVAS_H}"></canvas>
        </div>
        <div style="background:${cardBg};border:2px solid ${cardColor};border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;">
          <div style="font-size:52px;line-height:1;">${emoji}</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:${cardColor};margin-bottom:4px;">${statusLabel}</div>
            <div style="font-size:13px;color:#94a3b8;line-height:1.6;">${statusDesc}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:44px;font-weight:900;color:#f8fafc;font-variant-numeric:tabular-nums;line-height:1;">${absError.toFixed(2)}</div>
            <div style="font-size:13px;color:#64748b;">cm error</div>
            <div style="font-size:22px;font-weight:900;color:${cardColor};margin-top:4px;">${autoDir}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
          ${[["Reference line","#e2e8f0","White \u2014 correct length"],["Researcher B's line","#38bdf8","Blue \u2014 what B placed"]].map(([label, color, desc]) => `
            <div style="background:#1e293b;border-radius:10px;padding:12px 16px;border:1px solid #334155;">
              <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">${label}</div>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:32px;height:3px;background:${color};border-radius:2px;flex-shrink:0;"></div>
                <span style="font-size:13px;color:${color};">${desc}</span>
              </div>
            </div>`).join("")}
        </div>
        <button onclick="handleRecord()"
          style="width:100%;padding:14px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#c2410c,#fb923c);color:#fff;font-size:15px;font-weight:800;">
          \u2713 Recorded \u2014 Next Trial \u2192
        </button>
      </div>
    </div>`;
}

function initRecord() {
  drawComparison(document.getElementById("comparison-canvas"), S.adjustableLength);
}

// ── BUFFER SCREEN ─────────────────────────────────────────────────────────────
function renderBuffer() {
  return `
    <div class="wrap">
      <div style="max-width:440px;width:100%;text-align:center;">
        <div style="font-size:64px;margin-bottom:20px;">\u2705</div>
        <div style="font-size:11px;letter-spacing:0.15em;color:#4ade80;font-weight:700;text-transform:uppercase;margin-bottom:12px;">All 20 Trials Complete</div>
        <h2 style="font-size:24px;font-weight:800;margin:0 0 12px;color:#f8fafc;">Round finished!</h2>
        <div style="background:#1e293b;border-radius:14px;padding:20px;margin-bottom:32px;border:1px solid #334155;text-align:left;">
          <p style="margin:0 0 10px;font-size:14px;color:#94a3b8;line-height:1.7;">
            \uD83D\uDD12 <strong style="color:#e2e8f0;">Researcher B</strong> \u2014 please hand the device to
            <strong style="color:#fb923c;">Researcher C</strong> before continuing.
          </p>
          <p style="margin:0;font-size:13px;color:#64748b;line-height:1.6;">
            Results will only be shown after Researcher C confirms they have the device.
            Do not look at the next screen until the handoff is done.
          </p>
        </div>
        <button onclick="showResults()"
          style="width:100%;padding:14px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#c2410c,#fb923c);color:#fff;font-size:15px;font-weight:800;">
          Researcher C has the device \u2014 Show Results
        </button>
      </div>
    </div>`;
}

// ── RESULTS SCREEN ────────────────────────────────────────────────────────────
function renderResults() {
  const group = GROUPS[S.groupIdx];
  const round = group.rounds[S.roundIdx];
  const researcherBName = group.members[round.b];
  const errors = S.results.map((r) => Math.abs(r.error));
  const avgError = errors.reduce((a, b) => a + b, 0) / errors.length;
  const bestTrial = Math.min(...errors);
  const overshoots = S.results.filter((r) => r.direction === "+").length;
  const undershoots = S.results.filter((r) => r.direction === "\u2212").length;

  const statsItems = [
    { val: avgError.toFixed(2), unit: "cm",     label: "Avg Error",   color: "#38bdf8" },
    null,
    { val: bestTrial.toFixed(2), unit: "cm",    label: "Best Trial",  color: "#4ade80" },
    null,
    { val: overshoots,           unit: "trials", label: "Overshot +",  color: "#7dd3fc" },
    null,
    { val: undershoots,          unit: "trials", label: "Undershot \u2212", color: "#fb923c" },
  ];

  const statsHtml = statsItems.map((item) =>
    item === null
      ? `<div style="width:1px;height:48px;background:#334155;margin:0 auto;"></div>`
      : `<div>
           <div style="font-size:28px;font-weight:900;color:${item.color};">${item.val}<span style="font-size:12px;color:#64748b;"> ${item.unit}</span></div>
           <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;">${item.label}</div>
         </div>`
  ).join("");

  const trialsHtml = S.results.map((r, i) => {
    const barPct = Math.min(100, (Math.abs(r.error) / 3) * 100);
    const barColor = r.direction === "+" ? "#38bdf8" : "#fb923c";
    return `
      <div style="display:grid;grid-template-columns:44px 80px 1fr 72px 56px;padding:8px 16px;border-bottom:1px solid #0f172a;background:${i % 2 === 0 ? "#1e293b" : "#162032"};font-size:13px;align-items:center;">
        <span style="color:#64748b;">${i + 1}</span>
        <span style="color:#94a3b8;font-size:12px;">Block ${r.orderBlock}</span>
        <div style="background:#0f172a;border-radius:6px;height:7px;overflow:hidden;">
          <div style="width:${barPct}%;height:100%;background:${barColor};border-radius:6px;"></div>
        </div>
        <span style="text-align:right;color:#e2e8f0;font-variant-numeric:tabular-nums;">${Math.abs(r.error).toFixed(2)}</span>
        <span style="text-align:center;font-weight:900;color:${barColor};font-size:18px;">${r.direction}</span>
      </div>`;
  }).join("");

  const hasNextRound = S.roundIdx < group.rounds.length - 1;

  return `
    <div style="min-height:100vh;background:#0f172a;color:#e2e8f0;font-family:sans-serif;padding:24px;display:flex;flex-direction:column;align-items:center;">
      <div style="max-width:660px;width:100%;padding-top:32px;">
        <div style="text-align:center;margin-bottom:32px;">
          <div style="font-size:11px;letter-spacing:0.15em;color:#38bdf8;font-weight:700;text-transform:uppercase;margin-bottom:8px;">Round ${S.roundIdx + 1} Complete</div>
          <h2 style="font-size:26px;font-weight:800;margin:0 0 4px;color:#f8fafc;">Results</h2>
          <p style="color:#64748b;font-size:14px;margin:0;">Participant: ${researcherBName}</p>
        </div>
        <div style="background:#1e293b;border-radius:16px;padding:24px;margin-bottom:24px;border:1px solid #334155;display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;text-align:center;gap:4px;align-items:center;">
          ${statsHtml}
        </div>
        <div style="background:#1e293b;border-radius:16px;overflow:hidden;border:1px solid #334155;margin-bottom:28px;">
          <div style="display:grid;grid-template-columns:44px 80px 1fr 72px 56px;padding:10px 16px;border-bottom:1px solid #334155;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;">
            <span>#</span><span>Block</span><span>Error bar</span><span style="text-align:right;">cm</span><span style="text-align:center;">Dir</span>
          </div>
          <div style="max-height:340px;overflow-y:auto;">${trialsHtml}</div>
        </div>
        <div style="display:flex;gap:12px;">
          ${hasNextRound ? `<button onclick="handleNewRound()" style="flex:1;padding:13px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-size:14px;font-weight:800;">Next Round \u2192</button>` : ""}
          <button onclick="handleFinish()" style="flex:1;padding:13px 0;border-radius:12px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:14px;font-weight:700;">Back to Setup</button>
        </div>
      </div>
    </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function selectGroup(i)  { S.groupIdx = i; S.roundIdx = 0; render(); }
function selectRound(i)  { S.roundIdx = i; render(); }

function handleStart(gIdx, rIdx) {
  S.groupIdx = gIdx; S.roundIdx = rIdx;
  S.trialIdx = 0; S.results = [];
  S.preSetupPoints = [...DEFAULT_POINTS];
  S.preSetupActiveIdx = 0;
  S.screen = "preSetup"; render();
}

function setPreSetupActiveIdx(i) { S.preSetupActiveIdx = i; render(); }

function updatePreSetupPoint(val) {
  S.preSetupPoints[S.preSetupActiveIdx] = Number(val);
  const cm = ((Number(val) - REFERENCE_LENGTH) * PX_TO_CM).toFixed(1);
  const el = document.getElementById("offset-display");
  if (el) el.textContent = fmtCm(parseFloat(cm)) + " cm from center";
  drawPreview(document.getElementById("preview-canvas"), Number(val));
}

function handlePreSetupDone() {
  const built = buildTrials(S.preSetupPoints);
  S.trials = built;
  S.adjustableLength = built[0].startingLength;
  S.screen = "trialReady"; render();
}

function handleTrialReadyDone() { S.screen = "handoff"; render(); }
function handleBReady()         { S.screen = "trial";   render(); }
function handleSubmitTrial()    { S.screen = "submitBuffer"; render(); }
function goToRecord()           { S.screen = "record";  render(); }

function updateTrialLength(val) {
  S.adjustableLength = Number(val);
  drawMullerLyer(document.getElementById("trial-canvas"), Number(val));
}

function handleRecord() {
  const rawError = (S.adjustableLength - REFERENCE_LENGTH) * PX_TO_CM;
  const direction = rawError >= 0 ? "+" : "\u2212";
  const trial = S.trials[S.trialIdx];
  S.results = [...S.results, { orderBlock: trial.orderBlock, error: rawError, direction }];
  const nextIdx = S.trialIdx + 1;
  if (nextIdx >= S.trials.length) {
    S.screen = "buffer";
  } else {
    S.trialIdx = nextIdx;
    S.adjustableLength = S.trials[nextIdx].startingLength;
    S.screen = "trialReady";
  }
  render();
}

function showResults()   { S.screen = "results"; render(); }

function handleNewRound() {
  S.roundIdx += 1; S.trialIdx = 0; S.results = [];
  S.preSetupPoints = [...DEFAULT_POINTS]; S.preSetupActiveIdx = 0;
  S.screen = "preSetup"; render();
}

function handleFinish()  { S.screen = "setup"; render(); }

// ── BOOT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
